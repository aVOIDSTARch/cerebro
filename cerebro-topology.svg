<svg width="100%" viewBox="0 0 680 500" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <style>
      text { font-family: sans-serif; fill: #333; }
      .label-sm { font-size: 11px; }
      .label-md { font-size: 13px; font-weight: 500; }
      .label-it { font-size: 11px; font-style: italic; fill: #777; }
      .node-purple rect { fill: #EEEDFE; stroke: #7F77DD; }
      .node-teal   rect { fill: #E1F5EE; stroke: #1D9E75; }
      .node-coral  rect { fill: #FAECE7; stroke: #D85A30; }
      .node-amber  rect { fill: #FAEEDA; stroke: #BA7517; }
      .node-gray   rect { fill: #F1EFE8; stroke: #888780; }
    </style>
  </defs>

  <!-- Phase 1 header -->
  <text class="label-sm" x="340" y="22" text-anchor="middle">two isolated unit-graphs — same semantic region, not yet connected</text>

  <!-- Triple 1: Marie Curie -is-> woman -->
  <g class="node-purple">
    <rect x="30" y="34" width="130" height="36" rx="6" stroke-width="0.5"/>
  </g>
  <text class="label-md" x="95" y="57" text-anchor="middle">Marie Curie</text>

  <line x1="160" y1="52" x2="202" y2="52" stroke="#7F77DD" stroke-width="1.2" marker-end="url(#arrow)"/>
  <text class="label-sm" x="181" y="46" text-anchor="middle">is</text>

  <g class="node-teal">
    <rect x="202" y="34" width="82" height="36" rx="6" stroke-width="0.5"/>
  </g>
  <text class="label-md" x="243" y="57" text-anchor="middle">woman</text>

  <!-- Semantic gap -->
  <line x1="284" y1="52" x2="374" y2="52" stroke="#ccc" stroke-width="0.5" stroke-dasharray="3 4"/>
  <text class="label-it" x="329" y="47" text-anchor="middle">semantic proximity</text>

  <!-- Triple 2: RBG -is-> woman -->
  <g class="node-coral">
    <rect x="374" y="34" width="82" height="36" rx="6" stroke-width="0.5"/>
  </g>
  <text class="label-md" x="415" y="57" text-anchor="middle">RBG</text>

  <line x1="456" y1="52" x2="498" y2="52" stroke="#D85A30" stroke-width="1.2" marker-end="url(#arrow)"/>
  <text class="label-sm" x="477" y="46" text-anchor="middle">is</text>

  <g class="node-teal">
    <rect x="498" y="34" width="82" height="36" rx="6" stroke-width="0.5" stroke-dasharray="4 2"/>
  </g>
  <text class="label-md" x="539" y="57" text-anchor="middle">woman</text>

  <!-- Divider -->
  <line x1="30" y1="96" x2="650" y2="96" stroke="#ddd" stroke-width="0.5" stroke-dasharray="2 4"/>
  <text class="label-sm" x="340" y="112" text-anchor="middle">merger: second triple inserted — shared node collapses into one connected component</text>

  <!-- Phase 2: merged graph -->

  <!-- woman hub (center) -->
  <g class="node-teal">
    <rect x="265" y="182" width="150" height="44" rx="8" stroke-width="1"/>
  </g>
  <text class="label-md" x="340" y="200" text-anchor="middle">woman</text>
  <text class="label-sm" x="340" y="216" text-anchor="middle">hub · junction node</text>

  <!-- Marie Curie -->
  <g class="node-purple">
    <rect x="30" y="178" width="142" height="44" rx="6" stroke-width="0.5"/>
  </g>
  <text class="label-md" x="101" y="196" text-anchor="middle">Marie Curie</text>
  <text class="label-sm" x="101" y="212" text-anchor="middle">empirical · axiomatic</text>

  <!-- RBG -->
  <g class="node-coral">
    <rect x="508" y="178" width="142" height="44" rx="6" stroke-width="0.5"/>
  </g>
  <text class="label-md" x="579" y="196" text-anchor="middle">RBG</text>
  <text class="label-sm" x="579" y="212" text-anchor="middle">empirical · axiomatic</text>

  <!-- Edges to hub -->
  <line x1="172" y1="200" x2="263" y2="204" stroke="#7F77DD" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text class="label-sm" x="218" y="193" text-anchor="middle">is</text>
  <line x1="508" y1="200" x2="417" y2="204" stroke="#D85A30" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text class="label-sm" x="463" y="193" text-anchor="middle">is</text>

  <!-- Fictional character — dashed, different epistemic plane -->
  <g class="node-purple">
    <rect x="265" y="284" width="150" height="44" rx="6" stroke-width="0.5" stroke-dasharray="5 2"/>
  </g>
  <text class="label-md" x="340" y="302" text-anchor="middle">fictional:Elena</text>
  <text class="label-sm" x="340" y="318" text-anchor="middle">fictional · confidence null</text>

  <line x1="340" y1="284" x2="340" y2="228" stroke="#AFA9EC" stroke-width="1" stroke-dasharray="4 2" marker-end="url(#arrow)"/>
  <text class="label-sm" x="352" y="260" text-anchor="start">is</text>
  <text class="label-it" x="430" y="302" text-anchor="start">fictional plane</text>
  <text class="label-it" x="430" y="315" text-anchor="start">intersects at hub</text>

  <!-- Nobel prize node -->
  <g class="node-amber">
    <rect x="30" y="308" width="142" height="44" rx="6" stroke-width="0.5"/>
  </g>
  <text class="label-md" x="101" y="326" text-anchor="middle">Nobel Prize</text>
  <text class="label-sm" x="101" y="342" text-anchor="middle">empirical · established</text>
  <line x1="101" y1="222" x2="101" y2="306" stroke="#7F77DD" stroke-width="1" marker-end="url(#arrow)"/>
  <text class="label-sm" x="113" y="268" text-anchor="start">won</text>

  <!-- Legal legacy node -->
  <g class="node-amber">
    <rect x="508" y="308" width="142" height="44" rx="6" stroke-width="0.5"/>
  </g>
  <text class="label-md" x="579" y="326" text-anchor="middle">Legal legacy</text>
  <text class="label-sm" x="579" y="342" text-anchor="middle">empirical · probable</text>
  <line x1="579" y1="222" x2="579" y2="306" stroke="#D85A30" stroke-width="1" marker-end="url(#arrow)"/>
  <text class="label-sm" x="583" y="268" text-anchor="start">shaped</text>

  <!-- Semantic proximity arc -->
  <path d="M172 330 Q340 410 508 330" fill="none" stroke="#ccc" stroke-width="0.6" stroke-dasharray="3 4"/>
  <text class="label-it" x="340" y="408" text-anchor="middle">semantic proximity — embedding space pulls these close</text>
  <text class="label-it" x="340" y="421" text-anchor="middle">graph edge not yet asserted; proximity is implicit in geometry</text>

  <!-- Legend -->
  <rect x="30" y="448" width="620" height="40" rx="6" fill="#f8f8f6" stroke="#ddd" stroke-width="0.5"/>
  <text class="label-sm" x="340" y="464" text-anchor="middle">solid edges = empirical assertions · dashed edges = fictional plane · dashed arc = semantic proximity (pre-assertion)</text>
  <text class="label-sm" x="340" y="480" text-anchor="middle">the triple is the quantum — nodes carry no truth value alone; the edge is the assertion</text>
</svg>
